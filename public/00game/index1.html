<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Hands + Pose</title>
  <style>
    canvas { border: 1px solid #333; margin: 10px auto; display: block; }
  </style>
</head>
<body>
  <video id="video" width="640" height="480" autoplay playsinline></video>
  <canvas id="canvas" width="640" height="480"></canvas>

  <!-- TF.js Core + Backend -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.22.0/dist/tf-core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.22.0/dist/tf-backend-webgl.min.js"></script>

  <!-- Pose Detection - try a slightly newer patch if available -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3"></script>

  <!-- Hands -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection"></script>

  <script>
    let poseDetector, handDetector;
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    async function init() {
      await tf.setBackend('webgl');
      await tf.ready();
      console.log('✅ TF.js backend ready:', tf.getBackend());

      // Pose Detector
      try {
        poseDetector = await poseDetection.createDetector(
          poseDetection.SupportedModels.BlazePose,
          {
            runtime: 'tfjs',     // ← Changed to 'tfjs' for better CDN compatibility
            modelType: 'lite'
          }
        );
        console.log('✅ Pose detector loaded');
      } catch (e) {
        console.error('Pose detector failed:', e);
      }

      // Hand Detector
      handDetector = await handPoseDetection.createDetector(
        handPoseDetection.SupportedModels.MediaPipeHands,
        {
          runtime: 'mediapipe',
          modelType: 'lite',
          maxHands: 2
        }
      );
      console.log('✅ Hand detector loaded');

      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      video.srcObject = stream;
      await video.play();

      detectLoop();
    }

    async function detectLoop() {
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      if (poseDetector) {
        const poses = await poseDetector.estimatePoses(video);
        if (poses.length > 0) drawPose(poses[0]);
      }

      if (handDetector) {
        const hands = await handDetector.estimateHands(video);
        hands.forEach(hand => drawHand(hand));
      }

      requestAnimationFrame(detectLoop);
    }

    function drawPose(pose) {
      ctx.fillStyle = '#00ff00';
      pose.keypoints.forEach(kp => {
        if (kp.score > 0.3) {
          ctx.beginPath();
          ctx.arc(kp.x, kp.y, 5, 0, Math.PI * 2);
          ctx.fill();
        }
      });
    }

    function drawHand(hand) {
      ctx.fillStyle = '#ff00ff';
      hand.keypoints.forEach(kp => {
        ctx.beginPath();
        ctx.arc(kp.x, kp.y, 4, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    init().catch(console.error);
  </script>
</body>
</html>
