<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Hands + Pose Detection</title>
  <style>
    canvas { border: 1px solid #333; display: block; margin: 10px auto; }
    video { display: none; }
  </style>
</head>
<body>
  <video id="video" width="640" height="480" autoplay playsinline></video>
  <canvas id="canvas" width="640" height="480"></canvas>

  <!-- 1. TF.js Core + Backend (MUST come first) -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.22.0/dist/tf-core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.22.0/dist/tf-backend-webgl.min.js"></script>

  <!-- 2. Pose Detection -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.0.0"></script>

  <!-- 3. Hands -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection"></script>

  <script>
    async function init() {
      // Important: Set backend
      await tf.setBackend('webgl');
      await tf.ready();
      console.log('TF.js backend ready:', tf.getBackend());

      // Pose Detector
      const poseDetector = await poseDetection.createDetector(
        poseDetection.SupportedModels.BlazePose, 
        { 
          runtime: 'mediapipe',
          modelType: 'lite'   // start with lite for speed
        }
      );

      // Hand Detector
      const handDetector = await handPoseDetection.createDetector(
        handPoseDetection.SupportedModels.MediaPipeHands,
        { 
          runtime: 'mediapipe',
          modelType: 'lite',
          maxHands: 2 
        }
      );

      console.log("✅ Both detectors loaded successfully!");
      // ... rest of your code
    }

    init().catch(err => console.error("Init error:", err));
  </script>
</body>
</html>
