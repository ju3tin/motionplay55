<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Hands + Pose Detection</title>
  <style>
    canvas { border: 1px solid #333; display: block; margin: 10px auto; }
  </style>
</head>
<body>
  <video id="video" width="640" height="480" autoplay playsinline></video>
  <canvas id="canvas" width="640" height="480"></canvas>

  <!-- TF.js Dependencies (order matters) -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.22.0/dist/tf-core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.22.0/dist/tf-backend-webgl.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.22.0/dist/tf-converter.min.js"></script>

  <!-- Pose Detection -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3"></script>

  <!-- MediaPipe Hands (for hand detector) -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection"></script>

  <script>
    let poseDetector = null;
    let handDetector = null;

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    async function init() {
      await tf.setBackend('webgl');
      await tf.ready();
      console.log('✅ TF.js backend ready:', tf.getBackend());

      // 1. Pose Detector (using tfjs runtime)
      try {
        poseDetector = await poseDetection.createDetector(
          poseDetection.SupportedModels.BlazePose,
          { 
            runtime: 'tfjs',
            modelType: 'lite'
          }
        );
        console.log('✅ Pose detector (BlazePose) loaded');
      } catch (e) {
        console.error('Pose failed:', e);
      }

      // 2. Hand Detector
      try {
        handDetector = await handPoseDetection.createDetector(
          handPoseDetection.SupportedModels.MediaPipeHands,
          { 
            runtime: 'mediapipe',
            modelType: 'lite',
            maxHands: 2,
            solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/hands'
          }
        );
        console.log('✅ Hand detector loaded');
      } catch (e) {
        console.error('Hand failed:', e);
      }

      // Camera
      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      video.srcObject = stream;
      await video.play();

      detectLoop();
    }

    async function detectLoop() {
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      if (poseDetector) {
        const poses = await poseDetector.estimatePoses(video, { flipHorizontal: false });
        poses.forEach(drawPose);
      }

      if (handDetector) {
        const hands = await handDetector.estimateHands(video, { flipHorizontal: false });
        hands.forEach(drawHand);
      }

      requestAnimationFrame(detectLoop);
    }

    function drawPose(pose) {
      ctx.fillStyle = '#00ff00';
      pose.keypoints.forEach(kp => {
        if (kp.score > 0.3) {
          ctx.beginPath();
          ctx.arc(kp.x, kp.y, 6, 0, Math.PI * 2);
          ctx.fill();
        }
      });
    }

    function drawHand(hand) {
      ctx.fillStyle = '#ff00ff';
      hand.keypoints.forEach(kp => {
        ctx.beginPath();
        ctx.arc(kp.x, kp.y, 5, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    init().catch(console.error);
  </script>
</body>
</html>
