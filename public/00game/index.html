<!DOCTYPE html>
<html>
<head>
  <title>MotionPlay Full Tracker</title>

  <style>
    body {
      font-family: Arial;
      background: #0b0b0b;
      color: white;
      text-align: center;
    }

    video {
      width: 320px;
      border-radius: 12px;
    }

    #output {
      margin-top: 20px;
      white-space: pre-wrap;
    }

    button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h1>MotionPlay Skeleton + Hands</h1>

<button onclick="start()">Start Camera</button>
<button onclick="connect()">Connect Backend</button>

<video id="video" autoplay></video>

<div id="output">Waiting...</div>

<!-- MediaPipe (STABLE CDN LOAD ORDER) -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
let video = document.getElementById("video");
let socket;

let pose, hands, camera;

let latestPose = null;
let latestHands = null;

let userId = "user_" + Math.floor(Math.random() * 1000);

---

# 📡 CAMERA START
async function start() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;

  initMediaPipe();
}

---

# 🌐 CONNECT BACKEND
function connect() {
  socket = new WebSocket("wss://motionplayapi.onrender.com/pose");

  socket.onmessage = (e) => {
    document.getElementById("output").innerText =
      JSON.stringify(JSON.parse(e.data), null, 2);
  };
}

---

# 🧠 MEDIA PIPE INIT (FIXED)
function initMediaPipe() {

  pose = new Pose({
    locateFile: (file) =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
  });

  hands = new Hands({
    locateFile: (file) =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
  });

  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
  });

  hands.setOptions({
    maxNumHands: 2,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
  });

  pose.onResults(onPose);
  hands.onResults(onHands);

  camera = new Camera(video, {
    onFrame: async () => {
      // IMPORTANT: pose first, hands second (stable)
      await pose.send({ image: video });
      await hands.send({ image: video });
    },
    width: 640,
    height: 480
  });

  camera.start();
}

---

# 🧍 POSE CALLBACK
function onPose(results) {
  latestPose = results.poseLandmarks;
  send();
}

---

# ✋ HANDS CALLBACK
function onHands(results) {
  latestHands = results.multiHandLandmarks;
  send();
}

---

# 📤 SEND TO BACKEND
function send() {
  if (!socket || socket.readyState !== 1) return;
  if (!latestPose) return;

  let left = null;
  let right = null;

  if (latestHands && latestHands.length > 0) {
    left = latestHands[0] || null;
    right = latestHands[1] || null;
  }

  const packet = {
    user_id: userId,
    timestamp: Date.now(),

    body: latestPose.map(l => ({
      x: l.x,
      y: l.y,
      z: l.z,
      visibility: l.visibility
    })),

    left_hand: left ? left.map(l => ({ x: l.x, y: l.y, z: l.z })) : null,
    right_hand: right ? right.map(l => ({ x: l.x, y: l.y, z: l.z })) : null
  };

  socket.send(JSON.stringify(packet));
}
</script>

</body>
</html>
