<!DOCTYPE html>
<html>
<head>
  <title>MotionPlay Tester</title>
  <style>
    body {
      font-family: Arial;
      background: #0b0b0b;
      color: white;
      text-align: center;
    }

    video {
      width: 320px;
      border-radius: 12px;
    }

    #output {
      margin-top: 20px;
      font-size: 18px;
      white-space: pre-wrap;
    }

    button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h1>MotionPlay Pose Tester</h1>

<button onclick="start()">Start</button>
<button onclick="connect()">Connect Backend</button>

<video id="video" autoplay></video>

<div id="output">Waiting...</div>

<script>
let video = document.getElementById("video");
let socket;
let userId = "user_" + Math.floor(Math.random() * 1000);

// --------------------
// START CAMERA + MEDIA PIPE
// --------------------
async function start() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;

  loadMediaPipe();
}

// --------------------
// LOAD MEDIA PIPE (SAFE)
// --------------------
function loadMediaPipe() {
  const poseScript = document.createElement("script");
  poseScript.src = "https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js";
  poseScript.onload = loadCameraUtils;
  document.body.appendChild(poseScript);
}

function loadCameraUtils() {
  const camScript = document.createElement("script");
  camScript.src = "https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js";
  camScript.onload = initPose;
  document.body.appendChild(camScript);
}

// --------------------
// INIT POSE
// --------------------
function initPose() {
  const pose = new Pose({
    locateFile: (file) =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
  });

  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
  });

  pose.onResults(sendToBackend);

  const camera = new Camera(video, {
    onFrame: async () => {
      await pose.send({ image: video });
    },
    width: 640,
    height: 480
  });

  camera.start();
}

// --------------------
// WEBSOCKET CONNECT
// --------------------
function connect() {
  socket = new WebSocket("wss://motionplayapi.onrender.com/pose");

  socket.onopen = () => {
    console.log("Connected");
  };

  socket.onmessage = (event) => {
    document.getElementById("output").innerText =
      JSON.stringify(JSON.parse(event.data), null, 2);
  };

  socket.onerror = (e) => {
    console.log("WebSocket error", e);
  };
}

// --------------------
// SEND DATA
// --------------------
function sendToBackend(results) {
  if (!socket || socket.readyState !== WebSocket.OPEN) return;

  const landmarks = results.poseLandmarks;
  if (!landmarks) return;

  const packet = {
    user_id: userId,
    timestamp: Date.now(),
    body: landmarks.map(l => ({
      x: l.x,
      y: l.y,
      z: l.z,
      visibility: l.visibility
    })),
    left_hand: null,
    right_hand: null
  };

  socket.send(JSON.stringify(packet));
}
</script>

</body>
</html>
