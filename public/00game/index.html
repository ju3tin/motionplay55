<!DOCTYPE html>
<html>
<head>
<title>MotionPlay Full Tracker</title>

<style>
body { font-family: Arial; background: #0b0b0b; color: white; text-align: center; }
video { width: 320px; border-radius: 12px; }
#output { margin-top: 20px; white-space: pre-wrap; }
button { padding: 10px; margin: 5px; border-radius: 8px; }
</style>
</head>

<body>

<h1>MotionPlay Skeleton + Hands</h1>

<button onclick="start()">Start Camera</button>
<button onclick="connect()">Connect Backend</button>

<video id="video" autoplay></video>
<div id="output">Waiting...</div>

<!-- MediaPipe Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
// Global variables
let video = document.getElementById("video");
let socket;
let pose, hands, camera;
let latestPose = null;
let latestHands = null;
let userId = "user_" + Math.floor(Math.random() * 1000);

// Improved locateFile function
function createLocateFile(base) {
    return (file) => {
        if (file.endsWith('.tflite')) {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/${base}/${file}`;
        }
        return `https://cdn.jsdelivr.net/npm/@mediapipe/${base}/${file}`;
    };
}

// Start Camera
async function start() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        initMediaPipe();
        document.getElementById("output").innerText = "Camera started!";
    } catch (err) {
        console.error(err);
        document.getElementById("output").innerText = "Camera error: " + err.message;
    }
}

// Connect Backend
function connect() {
    if (socket && socket.readyState === 1) {
        document.getElementById("output").innerText = "Already connected!";
        return;
    }
    
    socket = new WebSocket("wss://motionplayapi.onrender.com/pose");

    socket.onopen = () => document.getElementById("output").innerText = "✅ Connected to backend!";
    socket.onmessage = (e) => {
        try {
            document.getElementById("output").innerText = JSON.stringify(JSON.parse(e.data), null, 2);
        } catch {
            document.getElementById("output").innerText = e.data;
        }
    };
    socket.onerror = () => document.getElementById("output").innerText = "❌ WebSocket error";
    socket.onclose = () => document.getElementById("output").innerText = "Connection closed";
}

// Init MediaPipe
function initMediaPipe() {
    pose = new Pose({
        locateFile: createLocateFile("pose")
    });

    hands = new Hands({
        locateFile: createLocateFile("hands")
    });

    pose.setOptions({
        modelComplexity: 1,
        smoothLandmarks: true,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    hands.setOptions({
        maxNumHands: 2,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    pose.onResults(onPose);
    hands.onResults(onHands);

    camera = new Camera(video, {
        onFrame: async () => {
            if (pose && hands) {
                await pose.send({ image: video });
                await hands.send({ image: video });
            }
        },
        width: 640,
        height: 480
    });

    camera.start();
}

function onPose(results) {
    latestPose = results.poseLandmarks;
    send();
}

function onHands(results) {
    latestHands = results.multiHandLandmarks;
    send();
}

function send() {
    if (!socket || socket.readyState !== 1 || !latestPose) return;

    let left = null, right = null;
    if (latestHands && latestHands.length > 0) {
        left = latestHands[0];
        right = latestHands[1];
    }

    const packet = {
        user_id: userId,
        timestamp: Date.now(),
        body: latestPose.map(l => ({
            x: l.x, y: l.y, z: l.z, visibility: l.visibility || 0
        })),
        left_hand: left ? left.map(l => ({ x: l.x, y: l.y, z: l.z })) : null,
        right_hand: right ? right.map(l => ({ x: l.x, y: l.y, z: l.z })) : null
    };

    socket.send(JSON.stringify(packet));
}
</script>

</body>
</html>
