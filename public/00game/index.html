<!DOCTYPE html>
<html>
<head>
<title>MotionPlay Tracker</title>
<style>
    body { font-family: Arial; background: #0b0b0b; color: white; text-align: center; margin: 0; padding: 20px; }
    video { width: 640px; border-radius: 12px; background: #000; }
    button { padding: 12px 24px; margin: 10px; font-size: 16px; border-radius: 8px; cursor: pointer; }
    #status { margin: 15px; font-size: 18px; min-height: 28px; }
    #output { margin-top: 20px; background: #1a1a1a; padding: 15px; border-radius: 8px; text-align: left; max-height: 400px; overflow-y: auto; white-space: pre-wrap; font-size: 13px; }
</style>
</head>
<body>

<h1>MotionPlay — Pose + Hands Tracker</h1>

<button onclick="startCamera()">📹 Start Camera</button>
<button onclick="connectWS()">🔗 Connect Backend</button>
<button onclick="stopAll()">⏹️ Stop</button>

<div style="position: relative; display: inline-block; margin: 20px;">
    <video id="video" autoplay playsinline></video>
</div>

<div id="status">Ready</div>
<div id="output">Waiting for data...</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.mjs" type="module"></script>

<script type="module">
import { FilesetResolver, PoseLandmarker, HandLandmarker } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.mjs";

let video = document.getElementById("video");
let socket = null;
let poseLandmarker = null;
let handLandmarker = null;
let isRunning = false;
let userId = "user_" + Math.floor(Math.random() * 10000);

async function startCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        document.getElementById("status").innerHTML = "✅ Camera started";
        initMediaPipe();
    } catch (e) {
        document.getElementById("status").innerHTML = "❌ Camera failed: " + e.message;
    }
}

async function initMediaPipe() {
    const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm"
    );

    poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
        baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task" },
        runningMode: "VIDEO",
        numPoses: 1
    });

    handLandmarker = await HandLandmarker.createFromOptions(vision, {
        baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task" },
        runningMode: "VIDEO",
        numHands: 2
    });

    isRunning = true;
    processVideo();
}

async function processVideo() {
    if (!isRunning) return;

    const now = performance.now();
    const poseResult = poseLandmarker.detectForVideo(video, now);
    const handResult = handLandmarker.detectForVideo(video, now);

    sendToServer(poseResult, handResult);

    requestAnimationFrame(processVideo);
}

function sendToServer(poseResult, handResult) {
    if (!socket || socket.readyState !== WebSocket.OPEN) return;

    let body = [];
    if (poseResult.landmarks?.length > 0) {
        body = poseResult.landmarks[0].map(l => ({
            x: l.x, y: l.y, z: l.z || 0, visibility: l.visibility || 1
        }));
    }

    let leftHand = null, rightHand = null;
    if (handResult.landmarks?.length > 0) {
        leftHand = handResult.landmarks[0].map(l => ({ x: l.x, y: l.y, z: l.z || 0 }));
        if (handResult.landmarks.length > 1) {
            rightHand = handResult.landmarks[1].map(l => ({ x: l.x, y: l.y, z: l.z || 0 }));
        }
    }

    const packet = {
        user_id: userId,
        timestamp: Date.now(),
        body: body,
        left_hand: leftHand,
        right_hand: rightHand
    };

    socket.send(JSON.stringify(packet));
}

function connectWS() {
    if (socket && socket.readyState === WebSocket.OPEN) {
        document.getElementById("status").innerHTML = "Already connected";
        return;
    }

    socket = new WebSocket("wss://motionplayapi.onrender.com/pose");   // Change to wss:// if deployed

    socket.onopen = () => {
        document.getElementById("status").innerHTML = "✅ Connected to Python Backend";
    };

    socket.onmessage = (event) => {
        document.getElementById("output").innerText = event.data;
    };

    socket.onerror = () => document.getElementById("status").innerHTML = "❌ WebSocket Error";
    socket.onclose = () => document.getElementById("status").innerHTML = "Connection closed";
}

function stopAll() {
    isRunning = false;
    if (socket) socket.close();
    document.getElementById("status").innerHTML = "Stopped";
}
</script>

</body>
</html>
