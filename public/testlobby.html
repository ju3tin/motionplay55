<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>PubNub Chat Example</title>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.11.0.2.js"></script>
    <style>
        #chat-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        #messages {
            height: 300px;
            overflow-y: auto;
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
            background-color: #f9f9f9;
        }
        .message {
            margin-bottom: 8px;
            padding: 8px;
            border-radius: 4px;
            background-color: #e9e9e9;
        }
        .input-container {
            display: flex;
        }
        #message-input {
            flex-grow: 1;
            padding: 8px;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div id="chat-container">
        <h1>PubNub Chat</h1>
        <div id="messages"></div>
        <div class="input-container">
            <input type="text" id="message-input" placeholder="Type a message..." />
            <button id="send-button">Send</button>
        </div>
    </div>

    <script>
        // Initialize PubNub
        const pubnub = new PubNub({
            publishKey: "pub-c-68268bc3-aaaf-4f33-be76-3bad63e49556",
            subscribeKey: "sub-c-01928852-def4-4659-be5f-4d2a37ce76d4",
            userId: "web-user-" + Math.floor(Math.random() * 1000)
        });

        // Display messages in the UI
        function displayMessage(message) {
            const messagesDiv = document.getElementById('messages');
            const messageElement = document.createElement('div');
            messageElement.className = 'message';
            
            // Format message based on content
            let content = '';
            if (typeof message === 'object' && message.text) {
                content = `${message.sender || 'User'}: ${message.text}`;
            } else {
                content = JSON.stringify(message);
            }
            
            messageElement.textContent = content;
            messagesDiv.appendChild(messageElement);
            messagesDiv.scrollTop = messagesDiv.scrollHeight; // Auto-scroll to bottom
        }

        // Add listener to handle messages
        pubnub.addListener({
            message: function(event) {
                displayMessage(event.message);
            },
            status: function(event) {
                if (event.category === "PNConnectedCategory") {
                    console.log("Connected to PubNub!");
                    // Display a connection message
                    const messagesDiv = document.getElementById('messages');
                    const statusElement = document.createElement('div');
                    statusElement.textContent = "Connected to chat!";
                    statusElement.style.textAlign = "center";
                    statusElement.style.color = "green";
                    messagesDiv.appendChild(statusElement);
                }
            }
        });

        // Subscribe to a channel
        const channel = pubnub.channel('hello_world');
        const subscription = channel.subscription();
        subscription.subscribe();

        // Publish message function
        async function publishMessage(text) {
            if (!text.trim()) return;
            
            try {
                const result = await pubnub.publish({
                    message: {
                        text: text,
                        sender: pubnub.getUUID(),
                        time: new Date().toISOString()
                    },
                    channel: 'hello_world'
                });
                console.log("Message published with timetoken:", result.timetoken);
            } catch (error) {
                console.error("Publish failed:", error);
            }
        }

        // Add event listeners for the UI
        document.getElementById('send-button').addEventListener('click', function() {
            const input = document.getElementById('message-input');
            publishMessage(input.value);
            input.value = '';
        });

        document.getElementById('message-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const input = document.getElementById('message-input');
                publishMessage(input.value);
                input.value = '';
            }
        });
    </script>
</body>
</html>
