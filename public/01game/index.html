<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hands + Full Body Detection</title>
  <style>
    body { margin:0; padding:10px; background:#111; color:white; font-family:Arial; text-align:center; }
    canvas { border:2px solid #0f0; border-radius:12px; max-width:100%; display:block; margin:10px auto; }
    #status { color:#0f0; margin:10px; }
  </style>
</head>
<body>
  <h1>Hands + Full Body Pose</h1>
  <p id="status">Loading...</p>

  <video id="video" autoplay playsinline style="display:none;"></video>
  <canvas id="canvas" width="640" height="480"></canvas>

  <script>
    const API_URL = "https://poseapi-uboi.onrender.com";   // ← Change if needed

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');

    let lastSent = 0;

    // Pose connections (MoveNet / BlazePose style)
    const POSE_CONNECTIONS = [
      [0,1],[0,2],[1,3],[2,4],           // face
      [5,6],[5,7],[6,8],[7,9],[8,10],    // arms
      [11,12],[11,13],[12,14],[13,15],[14,16], // legs
      [5,11],[6,12]                      // body
    ];

    async function startCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { width: { ideal: 640 }, height: { ideal: 480 } } 
      });
      video.srcObject = stream;
      await video.play();

      canvas.width = 640;
      canvas.height = 480;

      statusEl.textContent = "Connected ✓";
      requestAnimationFrame(loop);
    }

    async function loop() {
      // Draw mirrored video
      ctx.save();
      ctx.scale(-1, 1);
      ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
      ctx.restore();

      if (Date.now() - lastSent > 80) {   // ~12 fps
        lastSent = Date.now();
        sendToServer();
      }

      requestAnimationFrame(loop);
    }

    async function sendToServer() {
      try {
        const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.6));
        const formData = new FormData();
        formData.append('file', blob, 'frame.jpg');

        const res = await fetch(`${API_URL}/detect`, { method: 'POST', body: formData });
        const data = await res.json();

        if (data.error) return;

        drawHands(data.hands);
        drawPose(data.pose);
      } catch (e) {
        console.error(e);
      }
    }

    function drawHands(hands) {
      ctx.strokeStyle = '#00ff00';
      ctx.lineWidth = 3;
      ctx.fillStyle = '#00ff00';

      hands.forEach(hand => {
        const points = hand.landmarks;
        points.forEach((p, i) => {
          const x = canvas.width - (p.x * canvas.width);
          const y = p.y * canvas.height;
          ctx.beginPath();
          ctx.arc(x, y, 5, 0, Math.PI * 2);
          ctx.fill();
        });
      });
    }

    function drawPose(pose) {
      if (!pose || pose.length === 0) return;

      ctx.strokeStyle = '#ff00ff';
      ctx.lineWidth = 4;
      ctx.fillStyle = '#ff00ff';

      const kps = pose;

      // Draw connections
      POSE_CONNECTIONS.forEach(([i, j]) => {
        const a = kps[i];
        const b = kps[j];
        if (a && b && a.visibility > 0.3 && b.visibility > 0.3) {
          const x1 = canvas.width - (a.x * canvas.width);
          const y1 = a.y * canvas.height;
          const x2 = canvas.width - (b.x * canvas.width);
          const y2 = b.y * canvas.height;

          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();
        }
      });

      // Draw joints
      kps.forEach(kp => {
        if (kp.visibility > 0.3) {
          const x = canvas.width - (kp.x * canvas.width);
          const y = kp.y * canvas.height;
          ctx.beginPath();
          ctx.arc(x, y, 6, 0, Math.PI * 2);
          ctx.fill();
        }
      });
    }

    // Start
    startCamera().catch(err => {
      statusEl.textContent = "Error: " + err.message;
    });
  </script>
</body>
</html>
