<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediaPipe Holistic</title>
  <style>
    body { margin:0; padding:10px; background:#111; color:white; text-align:center; font-family:Arial; }
    canvas { border:3px solid #0ff; border-radius:12px; max-width:100%; margin:15px auto; display:block; }
  </style>
</head>
<body>
  <h1>MediaPipe Holistic (Face + Hands + Pose)</h1>
  <p id="status">Starting...</p>

  <video id="video" autoplay playsinline style="display:none;"></video>
  <canvas id="canvas" width="640" height="480"></canvas>

  <script>
    const API_URL = "https://poseapi-uboi.onrender.com";

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');

    let lastSent = 0;

    async function start() {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      video.srcObject = stream;
      await video.play();
      canvas.width = 640;
      canvas.height = 480;
      statusEl.textContent = "Holistic Running";
      loop();
    }

    function loop() {
      ctx.save();
      ctx.scale(-1, 1);
      ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
      ctx.restore();

      if (Date.now() - lastSent > 80) {
        lastSent = Date.now();
        sendFrame();
      }
      requestAnimationFrame(loop);
    }

    async function sendFrame() {
      const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.6));
      const form = new FormData();
      form.append('file', blob);

      try {
        const res = await fetch(`${API_URL}/detect`, { method: 'POST', body: form });
        const data = await res.json();

        // Redraw video
        ctx.save();
        ctx.scale(-1, 1);
        ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
        ctx.restore();

        drawPose(data.pose);
        drawHands(data.hands);
        drawFace(data.face);
      } catch(e) {}
    }

    function drawPose(pose) {
      if (!pose.length) return;
      ctx.strokeStyle = "#ff00ff";
      ctx.lineWidth = 4;
      ctx.fillStyle = "#ff00ff";

      // Connections (same as before)
      const connections = [[0,1],[0,2],[1,3],[2,4],[5,6],[5,7],[6,8],[7,9],[8,10],[11,12],[11,13],[12,14],[13,15],[14,16],[5,11],[6,12]];
      connections.forEach(([a,b]) => {
        const p1 = pose[a], p2 = pose[b];
        if (p1 && p2 && p1.visibility > 0.3 && p2.visibility > 0.3) {
          const x1 = canvas.width - p1.x*canvas.width;
          const y1 = p1.y*canvas.height;
          const x2 = canvas.width - p2.x*canvas.width;
          const y2 = p2.y*canvas.height;
          ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
        }
      });

      pose.forEach(kp => {
        if (kp.visibility > 0.3) {
          const x = canvas.width - kp.x * canvas.width;
          const y = kp.y * canvas.height;
          ctx.beginPath();
          ctx.arc(x, y, 6, 0, Math.PI*2);
          ctx.fill();
        }
      });
    }

    function drawHands(hands) {
      ctx.strokeStyle = "#00ff00";
      ctx.lineWidth = 3;
      ctx.fillStyle = "#00ff00";

      hands.forEach(hand => {
        hand.landmarks.forEach((p,i) => {
          const x = canvas.width - p.x * canvas.width;
          const y = p.y * canvas.height;
          ctx.beginPath();
          ctx.arc(x, y, 5, 0, Math.PI*2);
          ctx.fill();
        });
      });
    }

    function drawFace(face) {
      ctx.fillStyle = "#ffff00";
      face.forEach((p,i) => {
        if (i % 5 === 0) {  // draw fewer points for performance
          const x = canvas.width - p.x * canvas.width;
          const y = p.y * canvas.height;
          ctx.beginPath();
          ctx.arc(x, y, 2, 0, Math.PI*2);
          ctx.fill();
        }
      });
    }

    start();
  </script>
</body>
</html>
