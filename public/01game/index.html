<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pose Curl Counter API</title>
  <style>
    body { font-family: Arial; text-align: center; background: #111; color: white; }
    canvas { border: 3px solid cyan; border-radius: 12px; }
  </style>
</head>
<body>
  <h1>Pose Curl Counter</h1>
  <p id="status">Starting...</p>
  <video id="video" autoplay playsinline style="display:none;"></video>
  <canvas id="canvas" width="640" height="480"></canvas>

  <script>
    const API_URL = "https://poseapi-uboi.onrender.com";

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');

    async function start() {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      video.srcObject = stream;
      await video.play();
      loop();
    }

    async function loop() {
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.6));
      const form = new FormData();
      form.append('file', blob);

      const res = await fetch(`${API_URL}/detect`, { method: 'POST', body: form });
      const data = await res.json();

      if (!data.error) {
        statusEl.innerHTML = `Angle: <b>${data.angle}°</b> | Stage: <b>${data.stage}</b>`;
      }

      requestAnimationFrame(loop);
    }

    start();
  </script>
</body>
</html>
